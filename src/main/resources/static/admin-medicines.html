<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<div class="logo">
<h2>🏥 HMS</h2>
<p>Hospital Management</p>
</div>

<nav>

<a href="admin-dashboard.html">
<i class="fas fa-house"></i>
<span>Dashboard</span>
</a>

<a href="admin-doctors.html">
<i class="fas fa-user-doctor"></i>
<span>Doctors</span>
</a>

<a href="admin-staff.html">
<i class="fas fa-user-nurse"></i>
<span>Staff</span>
</a>

<a href="patients.html">
<i class="fas fa-bed"></i>
<span>Patients</span>
</a>

<a href="appointments.html">
<i class="fas fa-calendar-check"></i>
<span>Appointments</span>
</a>

<a href="billing.html">
<i class="fas fa-file-invoice-dollar"></i>
<span>Billing</span>
</a>

<a href="admin-medicines.html" class="active">
<i class="fas fa-pills"></i>
<span>Medicines</span>
</a>

<a href="#" onclick="logout()">
<i class="fas fa-right-from-bracket"></i>
<span>Logout</span>
</a>

</nav>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<div class="welcome">

<h1>Medicine Management</h1>

<p>Manage Hospital Medicines</p>

</div>

<div class="top-right">

<div class="search-box">

<i class="fas fa-search"></i>

<input
type="text"
id="searchMedicine"
placeholder="Search Medicine..."
onkeyup="searchMedicine()">

</div>

</div>

</div>

<!-- Cards -->

<div class="cards">

<div class="card">

<div>

<p>Total Medicines</p>

<h2 id="medicineCount">0</h2>

</div>

<i class="fas fa-pills"></i>

</div>

<div class="card">

<div>

<p>Low Stock</p>

<h2 id="lowStockCount">0</h2>

</div>

<i class="fas fa-triangle-exclamation"></i>

</div>

<div class="card">

<div>

<p>Expiring Soon</p>

<h2 id="expiryCount">0</h2>

</div>

<i class="fas fa-calendar-xmark"></i>

</div>

</div>

<!-- Toolbar -->

<div class="quick-actions">

<div style="display:flex;justify-content:space-between;align-items:center;">

<h2>

<i class="fas fa-pills"></i>

Medicine List

</h2>

<button class="btn" onclick="openMedicineModal()">

<i class="fas fa-plus"></i>

Add Medicine

</button>

</div>

</div>

<!-- Table -->

<div class="recent-card">

<table>

<thead>

<tr>

<th>Code</th>

<th>Name</th>

<th>Strength</th>

<th>Category</th>

<th>Stock</th>

<th>Price</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="medicineTable">

</tbody>

</table>

</div>

</div>

<script src="js/admin-medicines.js"></script>

</body>

</html>
<!-- ===========================
        Medicine Modal
=========================== -->

<div id="medicineModal" class="modal">

    <div class="modal-content">

        <h2 id="modalTitle">
            <i class="fas fa-pills"></i>
            Add Medicine
        </h2>

        <input type="hidden" id="medicineId">

        <label>Medicine Name</label>
        <input type="text" id="medicineName">

        <label>Generic Name</label>
        <input type="text" id="genericName">

        <label>Strength</label>
        <input type="text" id="strength">

        <label>Category</label>

        <select id="category">

            <option>Tablet</option>
            <option>Capsule</option>
            <option>Syrup</option>
            <option>Injection</option>
            <option>Ointment</option>
            <option>Drops</option>

        </select>

        <label>Dosage Form</label>

        <input type="text"
               id="dosageForm">

        <label>Manufacturer</label>

        <input type="text"
               id="manufacturer">

        <label>Price</label>

        <input type="number"
               id="price">

        <label>Stock</label>

        <input type="number"
               id="stock">

        <label>Reorder Level</label>

        <input type="number"
               id="reorderLevel">

        <label>Batch Number</label>

        <input type="text"
               id="batchNumber">

        <label>Expiry Date</label>

        <input type="date"
               id="expiryDate">

        <label>Status</label>

        <select id="status">

            <option>ACTIVE</option>
            <option>INACTIVE</option>

        </select>

        <label>Description</label>

        <textarea
            id="description"
            rows="4"></textarea>

        <div class="modal-buttons">

            <button
                class="deleteBtn"
                onclick="closeMedicineModal()">

                Cancel

            </button>

            <button
                class="btn"
                onclick="saveMedicine()">

                Save Medicine

            </button>

        </div>

    </div>

</div>
