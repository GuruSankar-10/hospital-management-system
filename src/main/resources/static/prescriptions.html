<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prescription Management</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    display:flex;
    background:#f1f5f9;
}
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#0f172a,#2563eb);
    color:white;
    padding:25px;
}
.sidebar h2{
    text-align:center;
    margin-bottom:40px;
}
.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
}
.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}
.topbar{
    background:white;
    padding:20px 30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
.card{
    background:white;
    padding:30px;
    margin-top:25px;
    border-radius:24px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.input-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}
input, textarea{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    width:250px;
}
textarea{
    width:100%;
    height:90px;
}
button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
}
.add-btn{background:#10b981;}
.delete-btn{background:#ef4444;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th{
    background:#1e293b;
    color:white;
    padding:15px;
}
td{
    padding:14px;
    border-bottom:1px solid #ddd;
    text-align:center;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>🏥 HMS</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑 Patients</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="billing.html">💳 Billing</a>
    <a href="prescriptions.html">💊 Prescription</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>💊 Prescription Management</h1>
    </div>

    <div class="card">
        <div class="input-group">
            <input id="doctorId" placeholder="Doctor ID">
            <input id="patientId" placeholder="Patient ID">
            <input id="disease" placeholder="Disease">
        </div>

        <br>

        <textarea id="medicines" placeholder="Medicines"></textarea>
        <br><br>
        <textarea id="advice" placeholder="Advice"></textarea>
        <br><br>

        <button class="add-btn" onclick="addPrescription()">
            Save Prescription
        </button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Doctor</th>
                    <th>Patient</th>
                    <th>Disease</th>
                    <th>Medicines</th>
                    <th>Advice</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="prescriptionTable"></tbody>
        </table>
    </div>

</div>

<script src="/js/prescriptions.js"></script>
</body>
</html>
