<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Appointments</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/admin.css">

</head>


<body>


<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<h2>🏥 HMS</h2>

<p>Staff Panel</p>

</div>


<nav>


<a href="staff-dashboard.html">

<i class="fas fa-house"></i>

Dashboard

</a>



<a href="staff-patients.html">

<i class="fas fa-bed"></i>

Patients

</a>



<a href="staff-appointments.html" class="active">

<i class="fas fa-calendar-check"></i>

Appointments

</a>



<a href="records.html">

<i class="fas fa-file-medical"></i>

Records

</a>



<a href="staff-profile.html">

<i class="fas fa-user"></i>

Profile

</a>


</nav>


</div>





<!-- Main -->

<div class="main">


<div class="topbar">


<div class="welcome">

<h1>

📅 Appointment Management

</h1>


<p>

Manage Patient Appointments

</p>


</div>


<div class="profile">

<i class="fas fa-user-nurse"></i>

<span id="staffName">

Staff

</span>


</div>


</div>







<!-- Search -->

<div class="quick-actions">


<h2>

<i class="fas fa-search"></i>

Search Appointment

</h2>



<input

type="text"

id="searchAppointment"

class="search-box"

placeholder="Search appointment..."

onkeyup="searchAppointments()">



</div>







<!-- Appointment Table -->


<div class="recent-card">


<h2>

<i class="fas fa-calendar-check"></i>

Appointments List

</h2>



<table>


<thead>


<tr>

<th>ID</th>

<th>Patient</th>

<th>Doctor</th>

<th>Date</th>

<th>Status</th>

<th>Action</th>


</tr>


</thead>



<tbody id="appointmentTable">


</tbody>



</table>



</div>







<footer class="footer">

<p>

© 2026 Hospital Management System | Staff Panel

</p>

</footer>



</div>







<script src="js/logout.js"></script>


<script>


if(
!localStorage.getItem("role") ||
localStorage.getItem("role") !== "STAFF"
){

window.location.href="login.html";

}



document.getElementById("staffName").innerHTML =
localStorage.getItem("name");



</script>


<script src="js/staff-appointments.js"></script>


</body>

</html>
