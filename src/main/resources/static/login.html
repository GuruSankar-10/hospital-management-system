<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HMS Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.container{
    width:900px;
    height:500px;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.left{
    flex:1;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.left h1{
    font-size:42px;
    margin-bottom:20px;
}

.left p{
    text-align:center;
    line-height:1.8;
}

.right{
    flex:1;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:80%;
}

.login-box h2{
    text-align:center;
    margin-bottom:30px;
    color:#1e293b;
}

input{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.roles{
    margin-top:20px;
    font-size:14px;
    color:gray;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    
    <div class="left">
        <h1>🏥 HMS</h1>
        <p>
            Hospital Management System <br>
            Secure Login Portal for Admin, Doctor & Staff
        </p>
    </div>

    <div class="right">
        <form class="login-box" method="post" action="/login">
            <h2>Login</h2>

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

            <div class="roles">
                Admin: admin/admin123 <br>
                Doctor: doctor/doctor123 <br>
                Staff: staff/staff123
            </div>
        </form>
    </div>
</div>

</body>
</html>
