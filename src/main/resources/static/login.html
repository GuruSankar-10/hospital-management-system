<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HMS Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);

}

.container{

    width:900px;
    height:500px;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.3);

}

.left{

    flex:1;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

}

.left h1{

    font-size:45px;
    margin-bottom:20px;

}

.left p{

    text-align:center;
    line-height:30px;

}

.right{

    flex:1;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

}

.login-box{

    width:80%;

}

.login-box h2{

    text-align:center;
    margin-bottom:30px;
    color:#1e293b;

}

input{

    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;

}

input:focus{

    outline:none;
    border:1px solid #2563eb;

}

button{

    width:100%;
    padding:15px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;

}

button:hover{

    background:#1d4ed8;

}

.roles{

    margin-top:25px;
    text-align:center;
    color:gray;

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>🏥 HMS</h1>

<p>

Hospital Management System

<br><br>

Secure Login Portal

</p>

</div>

<div class="right">

<div class="login-box">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Login

</button>

<div class="roles">

Admin • Doctor • Staff

</div>

</div>

</div>

</div>

<script>

function login(){

let loginData={

email:document.getElementById("email").value,

password:document.getElementById("password").value

};

fetch("http://localhost:8080/auth/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(loginData)

})

.then(response=>{

if(!response.ok){

throw new Error("Invalid Email or Password");

}

return response.json();

})

.then(data=>{

console.log(data);

localStorage.setItem("token", data.token);
localStorage.setItem("role", data.role);
localStorage.setItem("name", data.fullName);
localStorage.setItem("email", data.email);

// NEW
if (data.doctorId != null) {
    localStorage.setItem("doctorId", data.doctorId);
}

alert("Welcome " + data.fullName);

if(data.role==="ADMIN"){

window.location.href="dashboard.html";

}

else if(data.role==="DOCTOR"){

window.location.href="doctor-dashboard.html";

}

else if(data.role==="STAFF"){

window.location.href="staff-dashboard.html";

}

else{

alert("Invalid Role");

}

})

.catch(error=>{

alert(error.message);

});

}

</script>

</body>
</html>
