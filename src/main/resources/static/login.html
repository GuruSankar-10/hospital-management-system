<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Management System</title>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left">

        <h1>🏥 HMS</h1>

        <p>

            Hospital Management System

            <br><br>

            Quality Healthcare Through Technology

        </p>

    </div>

    <!-- Right Side -->

    <div class="right">

        <div class="login-box">

            <h2>

                Welcome Back 👋

            </h2>

            <div class="input-group">

                <label>

                    <i class="fa-solid fa-envelope"></i>

                    Email

                </label>

                <input
                type="email"
                id="email"
                placeholder="Enter your email">

            </div>

            <div class="input-group">

                <label>

                    <i class="fa-solid fa-lock"></i>

                    Password

                </label>

                <input
                type="password"
                id="password"
                placeholder="Enter your password">

            </div>

			<button
			id="loginBtn"
			class="login-btn"
			onclick="rememberUser(); login();">

			    Login Securely

			</button>

            <div class="forgot">

                <a href="#"

                onclick="openForgotPassword()">

                    Forgot Password?

                </a>

            </div>

            <div class="roles">

                Admin • Doctor • Staff

            </div>

        </div>

    </div>

</div>
<!-- ==========================================
     Forgot Password Modal
========================================== -->

<div id="forgotModal" class="modal">

    <div class="modal-content">

        <h2>

            🔑 Reset Password

        </h2>

        <div class="input-group">

            <label>

                <i class="fa-solid fa-envelope"></i>

                Email

            </label>

            <input
            type="email"
            id="resetEmail"
            placeholder="Enter Email">

        </div>

        <div class="input-group">

            <label>

                <i class="fa-solid fa-lock"></i>

                New Password

            </label>

            <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password">

        </div>

        <div class="input-group">

            <label>

                <i class="fa-solid fa-lock"></i>

                Confirm Password

            </label>

            <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password">

        </div>

        <button

        class="login-btn"

        onclick="resetPassword()">

            Reset Password

        </button>

        <button

        class="login-btn closeBtn"

        onclick="closeForgotPassword()">

            Cancel

        </button>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
