<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    background:#f1f5f9;
}

/* Sidebar */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#0f172a,#2563eb);
    color:white;
    padding:25px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-size:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

/* Main */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* Topbar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:20px 30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.topbar h1{
    color:#1e293b;
}

.logout-btn{
    padding:12px 24px;
    background:#ef4444;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

.logout-btn:hover{
    background:#dc2626;
}

/* Cards */
.card-container{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    padding:35px;
    border-radius:24px;
    color:white;
    box-shadow:0 15px 30px rgba(0,0,0,0.12);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    font-size:22px;
    margin-bottom:15px;
}

.card p{
    font-size:40px;
    font-weight:bold;
}

.card1{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.card2{background:linear-gradient(135deg,#10b981,#059669);}
.card3{background:linear-gradient(135deg,#f59e0b,#d97706);}
.card4{background:linear-gradient(135deg,#ef4444,#dc2626);}
.card5{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}

.footer{
    margin-top:40px;
    text-align:center;
    color:#64748b;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>🏥 HMS</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑 Patients</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="billing.html">💳 Billing</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Hospital Dashboard</h1>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <div class="card-container">

        <div class="card card1">
            <h2>👨‍⚕️ Doctors</h2>
            <p id="doctorCount">0</p>
        </div>

        <div class="card card2">
            <h2>🧑 Patients</h2>
            <p id="patientCount">0</p>
        </div>

        <div class="card card3">
            <h2>📅 Appointments</h2>
            <p id="appointmentCount">0</p>
        </div>

        <div class="card card4">
            <h2>💳 Bills</h2>
            <p id="billCount">0</p>
        </div>

        <div class="card card5">
            <h2>💰 Revenue</h2>
            <p id="revenue">0</p>
        </div>
		<div class="card" style="margin-top:30px;">
		    <h2>Hospital Statistics</h2>
		    <canvas id="statsChart"></canvas>
		</div>

		<div class="card" style="margin-top:30px;">
		    <h2>Payment Methods</h2>
		    <canvas id="paymentChart"></canvas>
		</div>
    </div>

    <div class="footer">
        © 2026 Hospital Management System | Designed by Guru
    </div>

</div>

<script src="/js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
