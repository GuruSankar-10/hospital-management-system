<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Management System</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>🏥 HMS</h2>

    <a href="dashboard.html">📊 Dashboard</a>

    <a href="doctors.html">👨‍⚕️ Doctors</a>

    <a href="patients.html">🧑 Patients</a>

    <a href="appointments.html">📅 Appointments</a>

    <a href="billing.html">💳 Billing</a>

    <a href="prescriptions.html">💊 Prescriptions</a>

    <a href="records.html">📁 Records</a>

    <a href="javascript:void(0)" onclick="logout()">
        🚪 Logout
    </a>

</div>

<!-- Main -->

<div class="main">

    <!-- Top Bar -->

    <div class="topbar">

        <h1>🏥 Hospital Management System</h1>

        <button class="back-btn" onclick="logout()">
            🚪 Logout
        </button>

    </div>

    <!-- Welcome Card -->

    <div class="card">

        <h2 id="welcome"></h2>

        <br>

        <p>
            Manage hospital operations professionally from one dashboard.
        </p>

    </div>

</div>

<!-- Logout Script -->
<script src="/js/logout.js"></script>

<script>

// Login Protection
if (!localStorage.getItem("name") || !localStorage.getItem("role")) {
    window.location.replace("login.html");
}

// Welcome User
const username = localStorage.getItem("name");

document.getElementById("welcome").innerHTML =
    "Welcome " + username + " 👋";

</script>

</body>
