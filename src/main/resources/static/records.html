<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Medical Records</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f4f7fb;
}

/* Sidebar */

.sidebar{

width:250px;
height:100vh;

position:fixed;
left:0;
top:0;

background:linear-gradient(180deg,#0f172a,#2563eb);

padding:25px;

color:white;

}

.sidebar h2{

text-align:center;
margin-bottom:40px;

font-size:30px;

}

.sidebar a{

display:block;

color:white;

text-decoration:none;

padding:15px;

margin:12px 0;

border-radius:12px;

transition:.3s;

}

.sidebar a:hover{

background:rgba(255,255,255,.2);

transform:translateX(5px);

}

/* Main */

.main{

margin-left:250px;

width:calc(100% - 250px);

padding:30px;

}

/* Topbar */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

background:white;

padding:20px 30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.topbar h1{

color:#1e293b;

}

#welcomeUser{

font-size:22px;

color:#2563eb;

font-weight:bold;

}
/* ================= Card ================= */

.card{

    background:white;

    margin-top:25px;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.card h2{

    color:#1e293b;

    margin-bottom:20px;

}

/* ================= Inputs ================= */

.input-group{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:20px;

}

input,
textarea{

    width:100%;

    padding:14px;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:15px;

}

input:focus,
textarea:focus{

    outline:none;

    border:2px solid #2563eb;

}

textarea{

    resize:vertical;

    min-height:100px;

}

/* ================= Buttons ================= */

.save-btn{

    background:#10b981;

    color:white;

    border:none;

    padding:14px 30px;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

}

.save-btn:hover{

    background:#059669;

}

.back-btn{

    background:#2563eb;

    color:white;

    border:none;

    padding:12px 22px;

    border-radius:10px;

    cursor:pointer;

    margin-top:10px;

}

.back-btn:hover{

    background:#1d4ed8;

}

</style>

</head>

<body>

<!-- ================= Sidebar ================= -->

<div class="sidebar">

<h2>🏥 HMS</h2>

<a href="dashboard.html">📊 Dashboard</a>

<a href="doctors.html">👨‍⚕️ Doctors</a>

<a href="patients.html">🧑 Patients</a>

<a href="appointments.html">📅 Appointments</a>

<a href="billing.html">💳 Billing</a>

<a href="prescriptions.html">💊 Prescriptions</a>

<a href="records.html">📁 Medical Records</a>

<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<!-- ================= Main ================= -->

<div class="main">

<div class="topbar">

<h1>📁 Medical Records</h1>

<div>

<h3 id="welcomeUser"></h3>

<button class="back-btn" onclick="history.back()">

⬅ Back

</button>

</div>

</div>

<!-- ================= Add Record ================= -->

<div class="card">

<h2>➕ Add Medical Record</h2>

<div class="input-group">

<input
type="text"
id="patientName"
placeholder="Patient Name">

<input
type="text"
id="doctorName"
placeholder="Doctor Name">

<input
type="date"
id="recordDate">

</div>

<textarea
id="diagnosis"
placeholder="Diagnosis">
</textarea>

<br><br>

<textarea
id="treatment"
placeholder="Treatment / Notes">
</textarea>

<br><br>

<button
class="save-btn">

💾 Save Medical Record

</button>

</div>
<!-- ================= Medical Records List ================= -->

<div class="card">

    <h2>📋 Medical Records</h2>

    <input
        type="text"
        id="searchBox"
        class="search-box"
        placeholder="🔍 Search Patient, Doctor or Diagnosis..."
        onkeyup="searchRecords()">

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>Patient</th>

                <th>Doctor</th>

                <th>Date</th>

                <th>Diagnosis</th>

                <th>Treatment</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="recordTable">

        </tbody>

    </table>

</div>

<!-- ================= Footer ================= -->

<div class="footer">

    <h3>© 2026 Hospital Management System | Medical Records Module</h3>

</div>

</div>

<style>

/* ================= Search ================= */

.search-box{

    width:350px;

    padding:12px;

    margin-bottom:20px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:15px;

}

.search-box:focus{

    outline:none;

    border:2px solid #2563eb;

}

/* ================= Table ================= */

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;

}

table th{

    background:#1e293b;

    color:white;

    padding:15px;

}

table td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #ddd;

}

table tr:hover{

    background:#f8fafc;

}

/* ================= Action Buttons ================= */

.edit-btn{

    background:#f59e0b;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:8px;

    cursor:pointer;

    margin-right:5px;

}

.edit-btn:hover{

    background:#d97706;

}

.delete-btn{

    background:#ef4444;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:8px;

    cursor:pointer;

}

.delete-btn:hover{

    background:#dc2626;

}

/* ================= Footer ================= */

.footer{

    text-align:center;

    margin-top:30px;

    color:#64748b;

}

</style>
<!-- ================= JavaScript Files ================= -->

<script src="/js/records.js"></script>
<script src="/js/logout.js"></script>

<script>

// ===============================
// Login Protection
// ===============================

const name = localStorage.getItem("name");
const role = localStorage.getItem("role");

if (!name || !role) {

    window.location.replace("login.html");

}

// ===============================
// Welcome User
// ===============================

document.getElementById("welcomeUser").innerHTML =
    "Welcome, " + name + " 👋";

// ===============================
// Prevent Browser Back
// ===============================

history.pushState(null, null, location.href);

window.onpopstate = function () {

    history.go(1);

};

// ===============================
// Auto Load Records
// ===============================

window.addEventListener("DOMContentLoaded", function () {

    if (typeof loadRecords === "function") {

        loadRecords();

    }

});

</script>

</body>

</html>
