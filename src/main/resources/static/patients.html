<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Patients Management</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    background:#f1f5f9;
}

/* Sidebar */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#0f172a,#2563eb);
    color:white;
    padding:25px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-size:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

/* Main */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* Topbar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:20px 30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.topbar h1{
    color:#1e293b;
}

/* Cards */
.card{
    background:white;
    padding:30px;
    margin-top:25px;
    border-radius:24px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:20px;
    color:#1e293b;
}

/* Inputs */
.input-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

input{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    width:220px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

/* Buttons */
button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.add-btn{
    background:linear-gradient(135deg,#10b981,#059669);
}

.add-btn:hover{
    opacity:0.9;
}

/* Search */
.search-box{
    width:350px;
    margin-top:20px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8fafc;
}

.edit-btn{
    background:#f59e0b;
    padding:8px 14px;
    margin-right:5px;
}

.delete-btn{
    background:#ef4444;
    padding:8px 14px;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🏥 HMS</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑 Patients</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="billing.html">💳 Billing</a>
</div>

<!-- Main -->
<div class="main">

    <div class="topbar">
        <h1>🧑 Patients Management</h1>
    </div>

    <!-- Add Patient -->
    <div class="card">
        <h2>Add Patient</h2>

        <div class="input-group">
            <input id="pname" placeholder="Patient Name">
            <input id="age" placeholder="Age">
            <input id="disease" placeholder="Disease">
            <input id="pphone" placeholder="Phone">
            <button class="add-btn" onclick="addPatient()">Add Patient</button>
        </div>
    </div>

    <!-- Patient List -->
    <div class="card">
        <h2>Patients List</h2>

        <input id="searchBox"
               class="search-box"
               placeholder="🔍 Search Patient..."
               onkeyup="searchPatients()">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Disease</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>
    </div>

</div>

<script src="/js/patients.js"></script>
</body>
</html>
