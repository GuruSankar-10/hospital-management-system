<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patients Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    background:#f4f7fb;
}

/* Sidebar */

.sidebar{

    width:250px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;

    background:linear-gradient(180deg,#0f172a,#2563eb);

    color:white;

    padding:25px;

}

.sidebar h2{

    text-align:center;
    margin-bottom:40px;
    font-size:30px;

}

.sidebar a{

    display:block;

    color:white;

    text-decoration:none;

    padding:15px;

    margin:12px 0;

    border-radius:12px;

    transition:.3s;

}

.sidebar a:hover{

    background:rgba(255,255,255,.2);

    transform:translateX(5px);

}

/* Main */

.main{

    margin-left:250px;

    width:calc(100% - 250px);

    padding:30px;

}

/* Topbar */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:white;

    padding:20px 30px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.topbar h1{

    color:#1e293b;

}

#welcomeUser{

    color:#2563eb;

    font-size:22px;

    font-weight:bold;

}
/* ================= CARD ================= */

.card{

    background:white;

    margin-top:25px;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.card h2{

    color:#1e293b;

    margin-bottom:20px;

}

/* ================= INPUTS ================= */

.input-group{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:20px;

}

input{

    width:100%;

    padding:14px;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:15px;

}

input:focus{

    outline:none;

    border:2px solid #2563eb;

}

/* ================= BUTTONS ================= */

.add-btn{

    background:#10b981;

    color:white;

    padding:14px 25px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

}

.add-btn:hover{

    background:#059669;

}

.edit-btn{

    background:#f59e0b;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:8px;

    cursor:pointer;

    margin-right:8px;

}

.delete-btn{

    background:#ef4444;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:8px;

    cursor:pointer;

}

/* ================= SEARCH ================= */

.search-box{

    width:350px;

    padding:12px;

    border-radius:10px;

    border:1px solid #ccc;

    margin-bottom:20px;

}

/* ================= TABLE ================= */

table{

    width:100%;

    border-collapse:collapse;

}

table th{

    background:#1e293b;

    color:white;

    padding:15px;

}

table td{

    padding:14px;

    border-bottom:1px solid #ddd;

    text-align:center;

}

table tr:hover{

    background:#f8fafc;

}

.footer{

    text-align:center;

    margin-top:30px;

    color:#64748b;

}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

<h2>🏥 HMS</h2>

<a href="dashboard.html">📊 Dashboard</a>

<a href="doctors.html">👨‍⚕️ Doctors</a>

<a href="patients.html">🧑 Patients</a>

<a href="appointments.html">📅 Appointments</a>

<a href="billing.html">💳 Billing</a>

<a href="prescriptions.html">💊 Prescriptions</a>

<a href="records.html">📁 Records</a>

<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

<div class="topbar">

<h1>🧑 Patients Management</h1>

<h3 id="welcomeUser"></h3>

</div>
<!-- ================= ADD PATIENT ================= -->

<div class="card">

    <h2>➕ Add Patient</h2>

    <div class="input-group">

        <input
            type="text"
            id="pname"
            placeholder="Patient Name">

        <input
            type="number"
            id="age"
            placeholder="Age">

        <input
            type="text"
            id="disease"
            placeholder="Disease">

        <input
            type="text"
            id="pphone"
            placeholder="Phone Number">

    </div>

    <button
        class="add-btn"
        onclick="addPatient()">

        ➕ Add Patient

    </button>

</div>

<!-- ================= PATIENTS LIST ================= -->

<div class="card">

    <h2>📋 Patients List</h2>

    <input
        type="text"
        id="searchBox"
        class="search-box"
        placeholder="🔍 Search Patient..."
        onkeyup="searchPatients()">

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Age</th>

                <th>Disease</th>

                <th>Phone</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="patientTable">

        </tbody>

    </table>

</div>

<div class="footer">

    <h3>© 2026 Hospital Management System | Patients Module</h3>

</div>

</div>
<!-- ================= JAVASCRIPT FILES ================= -->

<script src="/js/patients.js"></script>
<script src="/js/logout.js"></script>

<script>

// ===============================
// Login Protection
// ===============================

const name = localStorage.getItem("name");
const role = localStorage.getItem("role");

if (!name || !role) {

    window.location.replace("login.html");

}

// ===============================
// Welcome User
// ===============================

document.getElementById("welcomeUser").innerHTML =
    "Welcome, " + name + " 👋";

// ===============================
// Prevent Browser Back After Logout
// ===============================

history.pushState(null, null, location.href);

window.onpopstate = function () {

    history.go(1);

};

</script>

</body>

</html>
