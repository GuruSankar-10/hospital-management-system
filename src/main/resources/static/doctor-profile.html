<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/doctor.css">
<link rel="stylesheet" href="css/doctor-profile.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>🏥 HMS</h2>

    <a href="doctor-dashboard.html">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>

    <a href="doctor-patients.html">
        <i class="fa-solid fa-user-injured"></i>
        Patients
    </a>

    <a href="doctor-appointments.html">
        <i class="fa-solid fa-calendar-check"></i>
        Appointments
    </a>

    <a href="doctor-prescriptions.html">
        <i class="fa-solid fa-file-prescription"></i>
        Prescriptions
    </a>

    <a href="doctor-profile.html" class="active">
        <i class="fa-solid fa-user-doctor"></i>
        Profile
    </a>

    <a href="#" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>

</div>

<!-- Main Content -->

<div class="main">

    <div class="topbar">

        <h2>
            👨‍⚕️ Doctor Profile
        </h2>

    </div>

    <div class="profile-card">

        <div class="profile-image">

            <img id="profileImage"
            src="images/doctor.png"
            alt="Doctor">

        </div>

        <div class="profile-form">

            <div class="row">

                <div class="input-group">

                    <label>Name</label>

                    <input
                    type="text"
                    id="name">

                </div>

                <div class="input-group">

                    <label>Email</label>

                    <input
                    type="email"
                    id="email">

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Phone</label>

                    <input
                    type="text"
                    id="phone">

                </div>

                <div class="input-group">

                    <label>Specialization</label>

                    <input
                    type="text"
                    id="specialization">

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Department</label>

                    <input
                    type="text"
                    id="department">

                </div>

                <div class="input-group">

                    <label>Qualification</label>

                    <input
                    type="text"
                    id="qualification">

                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Experience (Years)</label>

                    <input
                    type="number"
                    id="experience">

                </div>

            </div>

            <div class="input-group">

                <label>About</label>

                <textarea
                id="about"
                rows="5"></textarea>

            </div>

            <div class="buttons">

                <button onclick="loadProfile()">
                    <i class="fa-solid fa-rotate"></i>
                    Refresh
                </button>

                <button onclick="saveProfile()">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Profile
                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/doctor-profile.js"></script>

</body>

</html>
