<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    background:#f1f5f9;
}

/* Sidebar */

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:linear-gradient(180deg,#0f172a,#2563eb);
    color:white;
    padding:25px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    transition:.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,.2);
    transform:translateX(5px);
}

/* Main */

.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:30px;
}

/* Topbar */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:20px 30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.topbar h1{
    color:#1e293b;
}

#welcomeAdmin{
    color:#2563eb;
}

/* Card */

.card{
    background:white;
    padding:30px;
    margin-top:25px;
    border-radius:24px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:20px;
    color:#1e293b;
}

/* Inputs */

.input-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

input,
select{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    width:250px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
}

/* Buttons */

button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.add-btn{
    background:linear-gradient(135deg,#10b981,#059669);
}

.add-btn:hover{
    opacity:.9;
}

.delete-btn{
    background:#ef4444;
    padding:8px 14px;
}

/* Search */

.search-box{
    width:350px;
    margin-top:20px;
}

/* Table */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8fafc;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>🏥 HMS</h2>

<a href="dashboard.html">📊 Dashboard</a>

<a href="doctors.html">👨‍⚕️ Doctors</a>

<a href="staff.html">👨‍💼 Staff</a>

<a href="patients.html">🧑 Patients</a>

<a href="appointments.html">📅 Appointments</a>

<a href="billing.html">💳 Billing</a>

<a href="prescriptions.html">💊 Prescriptions</a>

<a href="records.html">📁 Records</a>

<a href="javascript:void(0)" onclick="logout()">
🚪 Logout
</a>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h1>👨‍💼 Staff Management</h1>

<h3 id="welcomeAdmin"></h3>

</div>

<!-- Register Staff -->

<div class="card">

<h2>➕ Register Staff</h2>

<div class="input-group">

<input type="text" id="fullName" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<input type="text" id="phone" placeholder="Phone Number">

<select id="department">

<option value="">Select Department</option>

<option>Reception</option>

<option>Nurse</option>

<option>Pharmacy</option>

<option>Billing</option>

<option>Lab Technician</option>

</select>

<button
class="add-btn"
onclick="registerStaff()">

Register Staff

</button>

</div>

</div>

<!-- Staff List -->

<div class="card">

<h2>📋 Staff List</h2>

<input
type="text"
id="searchBox"
class="search-box"
placeholder="🔍 Search Staff..."
onkeyup="searchStaff()">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Phone</th>

<th>Department</th>

<th>Action</th>

</tr>

</thead>

<tbody id="staffTable">

</tbody>

</table>

</div>

</div>

<script src="/js/staff.js"></script>
<script src="/js/logout.js"></script>

<script>

// Login Protection
if (!localStorage.getItem("name") || !localStorage.getItem("role")) {
    window.location.replace("login.html");
}

// Welcome Message
const adminName = localStorage.getItem("name");

document.getElementById("welcomeAdmin").innerHTML =
"Welcome, " + adminName + " 👋";

// Prevent browser back after logout
history.pushState(null, null, location.href);

window.onpopstate = function () {
    history.go(1);
};

</script>

</body>
</html>
