<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billing Management</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    background:#f1f5f9;
}

/* Sidebar */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:linear-gradient(180deg,#0f172a,#2563eb);
    color:white;
    padding:25px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-size:28px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    transition:0.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
    transform:translateX(5px);
}

/* Main */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* Topbar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:20px 30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.topbar h1{
    color:#1e293b;
}

/* Card */
.card{
    background:white;
    padding:30px;
    margin-top:25px;
    border-radius:24px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:20px;
    color:#1e293b;
}

/* Inputs */
.input-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

input{
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    width:210px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

/* Buttons */
button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.bill-btn{
    background:linear-gradient(135deg,#10b981,#059669);
}

.delete-btn{
    background:#ef4444;
    padding:8px 14px;
}

.pdf-btn{
    background:#2563eb;
    padding:8px 14px;
    margin-left:5px;
}
.wa-btn{
    background:#25D366;
    padding:8px 14px;
    margin-left:5px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
    color:white;
    padding:15px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8fafc;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>🏥 HMS</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="patients.html">🧑 Patients</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="billing.html">💳 Billing</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>💳 Billing Management</h1>
    </div>

    <div class="card">
        <h2>Create Bill</h2>

        <div class="input-group">
            <input id="amount" placeholder="Amount">
            <input id="paymentStatus" placeholder="Payment Status">
            <input id="paymentMethod" placeholder="Payment Method">
            <input id="patientId" placeholder="Patient ID">
            <input id="appointmentId" placeholder="Appointment ID">
            <button class="bill-btn" onclick="addBill()">Create Bill</button>
        </div>
    </div>

    <div class="card">
        <h2>Bills List</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Method</th>
                    <th>Patient ID</th>
                    <th>Appointment ID</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="billingTable"></tbody>
        </table>
    </div>

</div>

<script src="/js/billing.js"></script>
</body>
</html>
