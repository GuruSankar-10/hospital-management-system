<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f7fc;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:250px;
    height:100vh;
    background:linear-gradient(180deg,#198754,#146c43);
    color:white;
}

.sidebar h2{
    text-align:center;
    padding:25px;
    border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:16px 25px;
    font-size:17px;
    transition:.3s;
}

.sidebar a:hover{
    background:white;
    color:#198754;
}

.main{
    margin-left:250px;
    padding:25px;
}

.topbar{
    background:white;
    border-radius:12px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile img{
    width:55px;
    height:55px;
    border-radius:50%;
}

.profile h3{
    color:#198754;
}

.welcome{
    margin-top:25px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.welcome h1{
    color:#198754;
}

.cards{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card i{
    font-size:40px;
    color:#198754;
    margin-bottom:15px;
}

.card p{
    color:gray;
}

.actions{
    margin-top:30px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.actions button{
    background:#198754;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.actions button:hover{
    background:#146c43;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:gray;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>
<i class="fa-solid fa-user-nurse"></i>
Staff Panel
</h2>

<a href="staff-dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>

<a href="patients.html">
<i class="fa-solid fa-bed"></i>
Patients
</a>

<a href="appointments.html">
<i class="fa-solid fa-calendar-check"></i>
Appointments
</a>

<a href="billing.html">
<i class="fa-solid fa-money-bill-wave"></i>
Billing
</a>

<a href="#">
<i class="fa-solid fa-user"></i>
Profile
</a>

<a href="javascript:void(0)" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>

<div class="main">

<div class="topbar">

<h2>Hospital Management System</h2>

<div class="profile">

<img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">

<div>

<h3 id="staffName"></h3>

<p>Hospital Staff</p>

</div>

</div>

</div>

<!-- Logout Script -->
<script src="/js/logout.js"></script>

<script>

// ===============================
// Login Protection
// ===============================
if (!localStorage.getItem("name") || !localStorage.getItem("role")) {
    window.location.replace("login.html");
}

// ===============================
// Display Logged-in Staff Name
// ===============================
const staffName = localStorage.getItem("name") || "Staff";

document.getElementById("staffName").innerHTML = staffName;

document.getElementById("welcome").innerHTML =
    "Welcome " + staffName + " 👋";

// ===============================
// Prevent Browser Back After Logout
// ===============================
history.pushState(null, null, location.href);

window.onpopstate = function () {
    history.go(1);
};

</script>
